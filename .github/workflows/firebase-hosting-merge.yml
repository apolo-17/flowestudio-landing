name: Deploy to Firebase Hosting on merge (producción)

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Crear archivo .env.production desde secret
        run: echo "${{ secrets.ENV_PRODUCTION }}" > .env.production

      - name: Build de producción
        run: npm run build:prod

      - name: Deploy a Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLOWESTUDIO_LANDING }}
          channelId: live
          projectId: flowestudio-landing
